name: Deploy Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_NAME: flowforge-ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker --quiet

      - name: Build container image
        run: |
          docker build \
            --build-arg VITE_SUPABASE_URL="${{ vars.VITE_SUPABASE_URL }}" \
            --build-arg VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            --build-arg VITE_SUPABASE_PUBLISHABLE_KEY="${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            --build-arg VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY="${{ vars.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}" \
            --build-arg VITE_AUTH_REDIRECT_URL="${{ vars.VITE_AUTH_REDIRECT_URL }}" \
            --build-arg VITE_SUPABASE_EMAIL_OTP_ENABLED="${{ vars.VITE_SUPABASE_EMAIL_OTP_ENABLED || 'false' }}" \
            --build-arg VITE_SUPABASE_APPLE_OAUTH_ENABLED="${{ vars.VITE_SUPABASE_APPLE_OAUTH_ENABLED || 'false' }}" \
            --build-arg VITE_SUPABASE_ENTERPRISE_SSO_ENABLED="${{ vars.VITE_SUPABASE_ENTERPRISE_SSO_ENABLED || 'true' }}" \
            --build-arg VITE_SUPABASE_PASSKEYS_ENABLED="${{ vars.VITE_SUPABASE_PASSKEYS_ENABLED || 'false' }}" \
            --build-arg VITE_SUPABASE_TOTP_MFA_ENABLED="${{ vars.VITE_SUPABASE_TOTP_MFA_ENABLED || 'true' }}" \
            --build-arg VITE_SUPABASE_SMS_MFA_FALLBACK_ENABLED="${{ vars.VITE_SUPABASE_SMS_MFA_FALLBACK_ENABLED || 'false' }}" \
            -t gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push container image
        run: docker push gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Show service URL
        run: gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE }}" --region "${{ vars.GCP_REGION }}" --format='value(status.url)'